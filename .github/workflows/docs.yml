name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build & deploy DocC
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Build DocC site
        run: |
          swift package --allow-writing-to-directory "$RUNNER_TEMP/docs" \
            generate-documentation \
            --target ComposeKit \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path ComposeKit \
            --output-path "$RUNNER_TEMP/docs"

      - name: Redirect site root to the documentation landing
        # DocC has no page at the base path; without this the root URL 404s.
        # Deep routes keep their own index.html, so only `/` is affected.
        run: |
          cat > "$RUNNER_TEMP/docs/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>ComposeKit Documentation</title>
              <meta http-equiv="refresh" content="0; url=./documentation/">
              <link rel="canonical" href="./documentation/">
            </head>
            <body>
              <a href="./documentation/">Continue to the ComposeKit documentation</a>
            </body>
          </html>
          HTML

      - uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically if it isn't already (no settings click).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/docs
      - id: deploy
        uses: actions/deploy-pages@v4
